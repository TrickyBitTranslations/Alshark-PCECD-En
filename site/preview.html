<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alshark - dialogue preview</title>
<link rel="stylesheet" href="style.css">
<style>
/* in-game dialogue box approximation (see screenshots: solid blue fill, thin lighter border, white
   text; the box is 216 px = 18 full-width cells wide). Line BREAKS are exact (real engine width
   model); glyph shapes are a web font, so each line carries a gauge of its true in-game px vs box. */
:root { --sc: 2.6; }
.pv-wrap { max-width: 900px; margin: 24px auto; padding: 0 16px; }
.pv-head { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.pv-head h1 { font-size:1.1rem; margin:0; }
.pv-head .muted { color:var(--dim,#8a93a3); font-size:.85rem; }
.pv-note { background:#2a2f3a; border-left:3px solid #6b7cff; padding:8px 12px; border-radius:4px;
           font-size:.85rem; margin:12px 0; }
.pv-stage { background:#101318; padding:calc(10px * var(--sc)) calc(8px * var(--sc));
            border-radius:6px; display:flex; flex-direction:column; gap:calc(6px * var(--sc)); }
.dlg-box {
  width: calc(216px * var(--sc));
  box-sizing: content-box;
  background:#1030c0;                                   /* royal-blue window fill */
  border: calc(1px * var(--sc)) solid #6f8cff;
  box-shadow: 0 0 0 calc(1px * var(--sc)) #0a1560, 0 2px 8px rgba(0,0,0,.5);
  padding: calc(6px * var(--sc)) calc(6px * var(--sc));
  display:flex; flex-direction:column; gap: calc(2px * var(--sc));
}
.dlg-line { display:flex; align-items:center; gap:12px; min-height: calc(11px * var(--sc)); }
.dlg-text { color:#fff; white-space:nowrap; line-height:1.1;
            font-size: calc(7px * var(--sc)); letter-spacing:.5px;
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; }
.dlg-line.over .dlg-text { color:#ffd0d0; }
.dlg-line.name .dlg-text { color:#ff6a5a; }              /* speaker name bar (#<04>..#<05>) - in-game highlight */
.dlg-gauge { margin-left:auto; flex:none; width:64px; height:6px; border-radius:3px;
             background:#0a1560; overflow:hidden; }
.dlg-gauge i { display:block; height:100%; background:#7fe08a; }
.dlg-gauge i.over { background:#ff5b5b; }
.pv-actions { margin-top:16px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.pv-actions .muted { color:var(--dim,#8a93a3); font-size:.8rem; }
</style>
</head>
<body>
<div class="pv-wrap">
  <div class="pv-head">
    <h1>Dialogue preview</h1>
    <span class="muted" id="pv-id"></span>
  </div>
  <div id="pv-body"><p class="dim">Loading…</p></div>
</div>
<script src="render.js"></script>
<script src="preview.js"></script>
</body>
</html>
